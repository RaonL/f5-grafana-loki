# =============================================================================
# F5 AWAF 모니터링 스택 - Docker Compose
# =============================================================================
# Grafana + Loki + Promtail로 F5 BIG-IP WAF 로그를 시각화합니다.
#
# 사용법:
#   docker compose up -d          # 실행
#   docker compose down           # 중지
#   docker compose logs -f        # 로그 확인
# =============================================================================

version: "3.9"

services:
  # --- Loki: 로그 저장/검색 엔진 ---
  loki:
    image: grafana/loki:3.6.11
    container_name: f5-loki
    hostname: loki
    restart: unless-stopped
    ports:
      - "3100:3100"           # Loki HTTP API (Grafana 연결용)
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki       # 로그 데이터 저장
    command:
      - -config.file=/etc/loki/loki-config.yml
    networks:
      - f5-monitoring-network

  # --- Promtail: 로그 수집기 (BIG-IP syslog 수신) ---
  promtail:
    image: grafana/promtail:3.6.11
    container_name: f5-promtail
    hostname: promtail
    restart: unless-stopped
    ports:
      - "9080:9080"           # Promtail 상태/메트릭
      - "1514:1514"           # TCP syslog 수신 (BIG-IP → Promtail)
      - "1514:1514/udp"       # UDP syslog 수신
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro  # WSL2 로그 접근 (선택)
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    networks:
      - f5-monitoring-network

  # --- Grafana: 대시보드 ---
  grafana:
    image: grafana/grafana:11.6.1
    container_name: f5-grafana
    hostname: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"           # Grafana 웹 UI
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana  # 대시보드 설정 저장
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro  # Loki 자동 연결
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro    # 대시보드 자동 임포트
    depends_on:
      - loki
    networks:
      - f5-monitoring-network

volumes:
  loki-data:
    driver: local
  grafana-data:
    driver: local

networks:
  f5-monitoring-network:
    driver: bridge
