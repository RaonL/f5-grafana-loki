# Promtail receives BIG-IP ASM/AWAF syslog and forwards parsed logs to Loki.
# The parsing rules below match the BIG-IP "remote-storage splunk" WAF log
# format used by f5devcentral/f5-waf-elk-dashboards.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: f5_asm_syslog
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: udp
      idle_timeout: 60s
      label_structured_data: true
    relabel_configs:
      - source_labels: ["__syslog_message_hostname"]
        target_label: bigip_host
      - source_labels: ["__syslog_message_severity"]
        target_label: severity
      - source_labels: ["__syslog_message_facility"]
        target_label: facility
    pipeline_stages:
      - regex:
          expression: '(?:^|,)attack_type="(?P<attack_type>[^"]*)"'
      - regex:
          expression: '(?:^|,)ip_client="(?P<ip_client>[^"]*)"'
      - regex:
          expression: '(?:^|,)method="(?P<method>[^"]*)"'
      - regex:
          expression: '(?:^|,)policy_name="(?P<policy_name>[^"]*)"'
      - regex:
          expression: '(?:^|,)request_status="(?P<request_status>[^"]*)"'
      - regex:
          expression: '(?:^|,)response_code="(?P<response_code>[^"]*)"'
      - regex:
          expression: '(?:^|,)sig_names="(?P<sig_names>[^"]*)"'
      - regex:
          expression: '(?:^|,)support_id="(?P<support_id>[^"]*)"'
      - regex:
          expression: '(?:^|,)uri="(?P<uri>[^"]*)"'
      - regex:
          expression: '(?:^|,)violations="(?P<violations>[^"]*)"'
      - regex:
          expression: '(?:^|,)violation_rating="(?P<violation_rating>[^"]*)"'
      - labels:
          attack_type:
          ip_client:
          method:
          policy_name:
          request_status:
          response_code:
          sig_names:
          violations:
          violation_rating:

  - job_name: f5_asm_syslog_tcp
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: tcp
      idle_timeout: 60s
      label_structured_data: true
    relabel_configs:
      - source_labels: ["__syslog_message_hostname"]
        target_label: bigip_host
      - source_labels: ["__syslog_message_severity"]
        target_label: severity
      - source_labels: ["__syslog_message_facility"]
        target_label: facility
    pipeline_stages:
      - regex:
          expression: '(?:^|,)attack_type="(?P<attack_type>[^"]*)"'
      - regex:
          expression: '(?:^|,)ip_client="(?P<ip_client>[^"]*)"'
      - regex:
          expression: '(?:^|,)method="(?P<method>[^"]*)"'
      - regex:
          expression: '(?:^|,)policy_name="(?P<policy_name>[^"]*)"'
      - regex:
          expression: '(?:^|,)request_status="(?P<request_status>[^"]*)"'
      - regex:
          expression: '(?:^|,)response_code="(?P<response_code>[^"]*)"'
      - regex:
          expression: '(?:^|,)sig_names="(?P<sig_names>[^"]*)"'
      - regex:
          expression: '(?:^|,)support_id="(?P<support_id>[^"]*)"'
      - regex:
          expression: '(?:^|,)uri="(?P<uri>[^"]*)"'
      - regex:
          expression: '(?:^|,)violations="(?P<violations>[^"]*)"'
      - regex:
          expression: '(?:^|,)violation_rating="(?P<violation_rating>[^"]*)"'
      - labels:
          attack_type:
          ip_client:
          method:
          policy_name:
          request_status:
          response_code:
          sig_names:
          violations:
          violation_rating:
