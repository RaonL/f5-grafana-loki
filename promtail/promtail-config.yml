# =============================================================================
# Promtail Configuration
# =============================================================================
# F5 BIG-IP WAF(ASM) 로그를 syslog로 수신하여 Loki로 전송
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

# --- 클라이언트: Loki 연결 ---
clients:
  - url: http://loki:3100/loki/api/v1/push

# --- 스크레이프 설정 ---
scrape_configs:

  # === 1. BIG-IP ASM syslog 수신 (UDP 1514) ===
  - job_name: f5_asm_syslog
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: udp
      idle_timeout: 60s
      label_structured_data: true
    relabel_configs:
      - source_labels: ["__syslog_message_hostname"]
        target_label: "bigip_host"
      - source_labels: ["__syslog_message_severity"]
        target_label: "severity"
      - source_labels: ["__syslog_message_facility"]
        target_label: "facility"
    pipeline_stages:
      # 타임스탬프 파싱
      - regex:
          expression: "^(?P<timestamp>\\w{3}\\s+\\d{1,2}\\s+\\d{2}:\\d{2}:\\d{2})"
      - regex:
          expression: "\\[(?P<attack_type>[^\\]]+)\\]"
      - regex:
          expression: "attack_type=(?P<attack_name>[^\\s]+)"
      - regex:
          expression: "src_ip=(?P<src_ip>[^\\s]+)"
      - regex:
          expression: "dest_ip=(?P<dest_ip>[^\\s]+)"
      - regex:
          expression: "uri=\"(?P<uri>[^\"]+)\""
      - regex:
          expression: "policy_name=(?P<policy_name>[^\\s]+)"
      - regex:
          expression: "violation_name=(?P<violation>[^\\s]+)"
      - regex:
          expression: "sig_name=(?P<signature>[^\\s]+)"
      - regex:
          expression: "request_status=(?P<action>[^\\s]+)"  # blocked, alarmed, etc.
      # 라벨 추가
      - labels:
          attack_type:
          attack_name:
          src_ip:
          violation:
          signature:
          action:
          policy_name:

  # === 2. TCP syslog 수신 (fallback) ===
  - job_name: f5_asm_syslog_tcp
    syslog:
      listen_address: 0.0.0.0:1514
      listen_protocol: tcp
      idle_timeout: 60s
    relabel_configs:
      - source_labels: ["__syslog_message_hostname"]
        target_label: "bigip_host"
    pipeline_stages:
      - regex:
          expression: "src_ip=(?P<src_ip>[^\\s]+)"
      - regex:
          expression: "violation_name=(?P<violation>[^\\s]+)"
      - regex:
          expression: "request_status=(?P<action>[^\\s]+)"
      - labels:
          src_ip:
          violation:
          action:
