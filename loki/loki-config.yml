# =============================================================================
# Loki Configuration
# =============================================================================
# F5 AWAF 로그 수집을 위한 Loki 설정
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

# --- 로그 보관 기간 설정 ---
common:
  instance_addr: 0.0.0.0
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 0.0.0.0
    kvstore:
      store: inmemory

# --- 스키마 설정 ---
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# --- 로그 보존 기간 (기본 30일, 필요시 조정) ---
limits_config:
  retention_period: 720h  # 30일 (30 * 24)
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # 7일 이상 오래된 샘플 거부
  max_query_length: 720h  # 최대 쿼리 기간
  max_entries_limit_per_query: 10000

# --- 라우터/쿼리 설정 ---
frontend:
  max_outstanding_per_tenant: 2048

table_manager:
  retention_deletes_enabled: true
  retention_period: 720h
