# =============================================================================
# Grafana Data Sources - 자동 프로비저닝
# =============================================================================
# Docker Compose 실행 시 Loki가 자동으로 Data Source에 등록됩니다.
# =============================================================================

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: "src_ip"
          matcherRegex: 'src_ip=(\d+\.\d+\.\d+\.\d+)'
          url: 'http://loki:3100/loki/api/v1/query?query={src_ip="$1"}'
    editable: true
    isDefault: true
